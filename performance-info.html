<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jenkins Performance</title>
  <style>
    /* 自定義樣式 */
    #performance-info {
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 14px;
      margin: 10px 0;
    }
    #performance-info span {
      font-weight: bold;
    }
    #performance-info .stat {
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <div id="performance-info">
    <div>CPU 使用率: <span id="cpu-usage" class="stat">載入中...</span></div>
    <div>內存使用率: <span id="memory-usage" class="stat">載入中...</span></div>
    <div>磁碟空間: <span id="disk-space" class="stat">載入中...</span></div>
  </div>

  <script>
    // 假數據，實際情況可替換為 API 調用
    function getCpuUsage() {
      document.getElementById('cpu-usage').innerText = "45%";
    }

    function getMemoryUsage() {
      document.getElementById('memory-usage').innerText = "65%";
    }

    function getDiskSpace() {
      document.getElementById('disk-space').innerText = "120 GB / 500 GB";
    }

    // 初始加載數據
    getCpuUsage();
    getMemoryUsage();
    getDiskSpace();
  </script>
</body>
</html>
